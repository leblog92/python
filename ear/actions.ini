# ══════════════════════════════════════════════════════════════════
# EAR — System actions file
# Maps voice triggers to files/apps to open.
# Reload at runtime with "Reload actions.ini" in the GUI.
#
# FORMAT
# ──────
# Each action is a section: [trigger phrase]
# Required keys:
#   type   = file | app
#
# For type = file:
#   path   = absolute or relative path to open with the default app
#
# For type = app:
#   windows = command to run on Windows
#   linux   = command to run on Linux
#   darwin  = command to run on macOS
#
# • Trigger phrases are lowercased automatically.
# • Longer triggers are matched before shorter ones (anti-false-positive).
# • Lines starting with # are comments.
# ══════════════════════════════════════════════════════════════════

